<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #111;
      background: #fff;
    }

    header {
      border-bottom: 1px solid #c00;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    .header-inner {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .site-title {
      font-size: 18px;
      font-weight: bold;
      color: #111;
      text-decoration: none;
    }

    .site-bio {
      font-size: 14px;
      color: #666;
      font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-list li {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 4px 0;
    }

    .bullet {
      margin-right: 2px;
    }

    .date {
      color: #c00;
      min-width: 60px;
      font-size: 14px;
    }

    .post-link {
      color: #06c;
      text-decoration: none;
    }

    .post-link:hover {
      text-decoration: underline;
    }

    .no-posts {
      color: #888;
      font-size: 14px;
      padding: 4px 0;
    }

    article {
      margin-top: 30px;
    }

    footer {
      border-top: 1px solid #c00;
      padding-top: 10px;
      margin-top: 30px;
      color: #888;
      font-size: 14px;
      text-align: center;
    }

    footer .disclaimer {
      font-style: italic;
      color: #555;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <a href="/" class="site-title">{{ site.title }}</a>
      <span class="site-bio">{{ site.bio }}</span>
    </div>
  </header>

  {{ content }}

  <footer>
    <div class="disclaimer">
      <strong>Disclaimer:</strong> The content presented on this blog is intended solely for educational and research purposes.
    </div>
  </footer>

</body>
</html>
