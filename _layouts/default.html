<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #111;
      background: #fff;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 40px;
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-list li {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }

    .date {
      color: #777;
      font-size: 14px;
      white-space: nowrap;
      margin-left: 20px;
    }

    footer {
      margin-top: 60px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  {{ content }}

  <footer>
    © 2026 Polly
  </footer>

</body>
</html>
