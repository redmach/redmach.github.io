<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #111;
      background: #fff;
    }

    a {
      color: #111;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    .post-list {
      list-style: none;
      padding: 0;
    }

    .post-list li {
      margin-bottom: 12px;
    }

    .date {
      color: #777;
      margin-left: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
