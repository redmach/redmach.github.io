<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #111;
      background: #fff;
    }

    header {
      border-bottom: 1px solid #c00;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    .header-inner {
      display: flex;
      /*align-items: baseline;*/
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      overflow: hidden;
    }

    .site-title {
      font-size: 18px;
      font-weight: bold;
      color: #111;
      text-decoration: none;
      white-space: nowrap;
    }

    .site-bio {
      font-size: 14px;
      color: #666;
      font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 480px) {
      .header-inner {
        gap: 5px; /* Reduce gap between title and bio */
      }

      .site-title {
        font-size: 16px; /* Reduce title size on small screens */
      }

      .site-bio {
        font-size: 12px; /* Reduce bio font size */
        max-width: 70%; /* Limit the width of bio to fit within the screen */
        overflow: hidden; /* Ensure text doesn't overflow */
        text-overflow: ellipsis; /* Add ellipsis if text is too long */
      }
    }
    
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .post-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .post-list li {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 4px 0;
    }

    .bullet {
      margin-right: 2px;
    }

    .date {
      color: #c00;
      min-width: 60px;
      font-size: 14px;
    }

    .post-link {
      color: #06c;
      text-decoration: none;
    }

    .post-link:hover {
      text-decoration: underline;
    }

    .more-link {
      color: #06c;
      text-decoration: none;
      font-weight: normal;
    }

    .more-link:hover {
      text-decoration: underline;
    }
    
    .no-posts {
      color: #888;
      font-size: 14px;
      padding: 4px 0;
    }

    article {
      margin-top: 30px;
    }

    img {
      max-width: 80px; /* Small size */
      height: auto;    /* Maintain aspect ratio */
      border-radius: 50%; /* Round image */
      margin-top: 10px; /* Position directly beneath title */
      margin-bottom: 20px; /* Space below the image */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Optional shadow */
    }

    footer {
      border-top: 1px solid #c00;
      padding-top: 10px;
      margin-top: 30px;
      color: #888;
      font-size: 14px;
      text-align: center;
    }

    footer .disclaimer {
      font-style: italic;
      color: #555;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <a href="/" class="site-title">{{ site.title }}</a>
      <span class="site-bio">{{ site.bio }}</span>
    </div>
  </header>

  {{ content }}

  <footer>
    <div class="disclaimer">
      <strong>Disclaimer:</strong> The content presented on this blog is intended solely for educational and research purposes. <a href="/disclaimer-and-privacy-notice" class="more-link">Read More</a>
    </div>
  </footer>

</body>
</html>
